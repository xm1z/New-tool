<script>
(function() {
  // ── State ──────────────────────────────────────────────────────────────
  var annotations = [];   // finished measurements
  var placing     = [];   // points being placed for current measurement
  var activeTool  = 0;    // 0=none, 1=supp, 2=regular, 3=cobb
  var dragging    = null; // {ai, key} or {placing:true, pi}
  var DOT_R   = 4;
  var HIT_R   = 22;

  // ── Elements ────────────────────────────────────────────────────────────
  var canvas  = document.getElementById('overlay');
  var ctx     = canvas.getContext('2d');
  var xrayImg = document.getElementById('xray-img');
  var imgWrap = document.getElementById('img-wrap');
  var center  = document.getElementById('center');

  // ── Geometry ─────────────────────────────────────────────────────────────
  function dist(a, b) {
    var dx = b.x - a.x, dy = b.y - a.y;
    return Math.sqrt(dx*dx + dy*dy);
  }

  function angleBetween(p1, vertex, p2) {
    // inner angle at vertex
    var v1x = p1.x - vertex.x, v1y = p1.y - vertex.y;
    var v2x = p2.x - vertex.x, v2y = p2.y - vertex.y;
    var dot = v1x*v2x + v1y*v2y;
    var mag = Math.sqrt(v1x*v1x + v1y*v1y) * Math.sqrt(v2x*v2x + v2y*v2y);
    if (mag === 0) return 0;
    return Math.acos(Math.max(-1, Math.min(1, dot / mag))) * 180 / Math.PI;
  }

  function cobbAngle(a, b, c, d) {
    // Angle between line AB and line CD
    // Direction vectors
    var dx1 = b.x - a.x, dy1 = b.y - a.y;
    var dx2 = d.x - c.x, dy2 = d.y - c.y;
    var dot  = dx1*dx2 + dy1*dy2;
    var mag  = Math.sqrt(dx1*dx1 + dy1*dy1) * Math.sqrt(dx2*dx2 + dy2*dy2);
    if (mag === 0) return 0;
    var ang = Math.acos(Math.max(-1, Math.min(1, Math.abs(dot) / mag))) * 180 / Math.PI;
    return ang;
  }

  // ── Layout ────────────────────────────────────────────────────────────────
  function layoutImage() {
    var natW = xrayImg.naturalWidth;
    var natH = xrayImg.naturalHeight;
    if (!natW || !natH) return;
    var scale = Math.min(center.clientWidth / natW, center.clientHeight / natH);
    var dw = Math.floor(natW * scale);
    var dh = Math.floor(natH * scale);
    imgWrap.style.width  = dw + 'px';
    imgWrap.style.height = dh + 'px';
    xrayImg.style.width  = dw + 'px';
    xrayImg.style.height = dh + 'px';
    canvas.width  = dw;
    canvas.height = dh;
    canvas.style.width  = dw + 'px';
    canvas.style.height = dh + 'px';
    redraw();
  }

  window.addEventListener('resize', function() {
    if (!xrayImg.naturalWidth) return;
    var oldW = canvas.width, oldH = canvas.height;
    layoutImage();
    var newW = canvas.width, newH = canvas.height;
    if (oldW && oldH && (newW !== oldW || newH !== oldH)) {
      var sx = newW / oldW, sy = newH / oldH;
      function sp(p) { return {x: p.x*sx, y: p.y*sy}; }
      annotations = annotations.map(function(a) {
        var n = {type:a.type, angleDeg:a.angleDeg, id:a.id};
        if (a.type === 3) {
          n.p1 = sp(a.p1); n.p2 = sp(a.p2);
          n.p3 = sp(a.p3); n.p4 = sp(a.p4);
        } else {
          n.vertex = sp(a.vertex); n.p1 = sp(a.p1); n.p2 = sp(a.p2);
        }
        return n;
      });
      placing = placing.map(sp);
      redraw();
    }
  });

  // ── Pointer helpers ───────────────────────────────────────────────────────
  function getPt(e) {
    var rect = canvas.getBoundingClientRect();
    var src  = e.touches ? e.touches[0] : e;
    return { x: src.clientX - rect.left, y: src.clientY - rect.top };
  }

  // ── Drawing ───────────────────────────────────────────────────────────────
  function drawDot(pt, color) {
    ctx.beginPath(); ctx.arc(pt.x, pt.y, DOT_R + 4, 0, Math.PI*2);
    ctx.fillStyle = color + '28'; ctx.fill();
    ctx.beginPath(); ctx.arc(pt.x, pt.y, DOT_R + 1, 0, Math.PI*2);
    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath(); ctx.arc(pt.x, pt.y, DOT_R, 0, Math.PI*2);
    ctx.fillStyle = color; ctx.fill();
  }

  function drawLine(a, b, color, dashed) {
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    if (dashed) ctx.setLineDash([6, 4]); else ctx.setLineDash([]);
    ctx.stroke(); ctx.setLineDash([]);
  }

  function drawLabel(text, x, y, color) {
    ctx.font = 'bold 14px \'Courier New\'';
    ctx.shadowColor = '#000'; ctx.shadowBlur = 8;
    ctx.fillStyle = color; ctx.textAlign = 'left';
    ctx.fillText(text, x, y);
    ctx.shadowBlur = 0;
  }

  function drawAnnoSuppReg(a) {
    var col = a.type === 1 ? '#ffdd00' : '#00ffc8';
    drawLine(a.vertex, a.p1, col, false);
    drawLine(a.vertex, a.p2, col, false);
    var ang1 = Math.atan2(a.p1.y - a.vertex.y, a.p1.x - a.vertex.x);
    var ang2 = Math.atan2(a.p2.y - a.vertex.y, a.p2.x - a.vertex.x);
    ctx.beginPath(); ctx.arc(a.vertex.x, a.vertex.y, 24, ang1, ang2, false);
    ctx.strokeStyle = col + '99'; ctx.lineWidth = 3; ctx.stroke();
    drawDot(a.vertex, '#ff6030');
    drawDot(a.p1, col);
    drawDot(a.p2, col);
    var tag = a.type === 1 ? ' (S)' : ' (R)';
    drawLabel(a.angleDeg.toFixed(1) + '°' + tag, a.vertex.x + 30, a.vertex.y - 6, col);
  }

  function drawAnnoCobb(a) {
    var col = '#ff88ff';
    // Draw two lines
    drawLine(a.p1, a.p2, col, false);
    drawLine(a.p3, a.p4, col, false);
    // Extend lines to show intersection hint
    drawDot(a.p1, col); drawDot(a.p2, col);
    drawDot(a.p3, col); drawDot(a.p4, col);
    // Label near midpoint of first line
    var mx = (a.p1.x + a.p2.x) / 2;
    var my = (a.p1.y + a.p2.y) / 2 - 10;
    drawLabel(a.angleDeg.toFixed(1) + '° (C)', mx, my, col);
  }

  function redraw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < annotations.length; i++) {
      var a = annotations[i];
      if (a.type === 3) drawAnnoCobb(a);
      else drawAnnoSuppReg(a);
    }
    // Draw in-progress placing points
    for (var j = 0; j < placing.length; j++) {
      var col = activeTool === 1 ? '#ffdd00' : (activeTool === 2 ? '#00ffc8' : '#ff88ff');
      drawDot(placing[j], activeTool === 1 || activeTool === 2 ? (j === 0 ? '#ff6030' : col) : col);
      if (activeTool !== 3 && j > 0) {
        drawLine(placing[0], placing[j], col + '66', true);
      }
      if (activeTool === 3 && j === 1) drawLine(placing[0], placing[1], col + '66', true);
      if (activeTool === 3 && j === 3) drawLine(placing[2], placing[3], col + '66', true);
    }
    updateUI();
  }

  // ── UI update ────────────────────────────────────────────────────────────
  var HINTS = {
    1: ['① Tap the fracture APEX', '② Tap a point on the SHAFT', '③ Tap a point on the FRAGMENT'],
    2: ['① Tap the VERTEX (center point)', '② Tap point on FIRST LINE', '③ Tap point on SECOND LINE'],
    3: ['① Tap start of LINE 1', '② Tap end of LINE 1', '③ Tap start of LINE 2', '④ Tap end of LINE 2']
  };

  function updateUI() {
    var hasAny = annotations.length > 0 || placing.length > 0;
    document.getElementById('btn-clear').style.display = hasAny ? 'block' : 'none';
    document.getElementById('legend').style.display    = hasAny ? 'block' : 'none';

    var hb = document.getElementById('hint-box');
    if (activeTool && placing.length < (activeTool === 3 ? 4 : 3)) {
      hb.style.display = 'block';
      hb.style.color = activeTool === 1 ? '#ffdd00' : (activeTool === 2 ? '#00ffc8' : '#ff88ff');
      hb.textContent = HINTS[activeTool][placing.length];
    } else {
      hb.style.display = 'none';
    }

    // Measurements list
    var mw = document.getElementById('meas-wrap');
    var md = document.getElementById('measurements');
    if (annotations.length > 0) {
      mw.style.display = 'block';
      var h = '';
      for (var i = 0; i < annotations.length; i++) {
        var a = annotations[i];
        var col = a.type === 1 ? '#ffdd00' : (a.type === 2 ? '#00ffc8' : '#ff88ff');
        var lbl = a.type === 1 ? '∠S' : (a.type === 2 ? '∠R' : '∠C');
        h += '<div class="meas-row">' +
             '<span class="ml" style="color:' + col + '">' + lbl + ' ' + (i+1) + '</span>' +
             '<span class="mv" style="color:' + col + '">' + a.angleDeg.toFixed(1) + '°</span>' +
             '<button class="md" onclick="window._delAnno(' + i + ')">✕</button>' +
             '</div>';
      }
      md.innerHTML = h;
    } else {
      mw.style.display = 'none';
    }

    // Readout
    var ro = document.getElementById('angle-readout');
    if (annotations.length > 0) {
      var last = annotations[annotations.length - 1];
      var col = last.type === 1 ? '#4ade80' : (last.type === 2 ? '#00ffc8' : '#ff88ff');
      ro.style.display = 'block';
      document.getElementById('readout-val').style.color = col;
      document.getElementById('readout-val').style.textShadow = '0 0 14px ' + col + '88';
      document.getElementById('readout-val').textContent = last.angleDeg.toFixed(1) + '°';
    } else {
      ro.style.display = 'none';
    }

    canvas.style.cursor = dragging ? 'grabbing' : (activeTool ? 'crosshair' : (hasAny ? 'grab' : 'default'));
    canvas.style.pointerEvents = (activeTool || hasAny) ? 'auto' : 'none';
  }

  // ── File upload ────────────────────────────────────────────────────────────
  document.getElementById('xray-upload').addEventListener('change', function(e) {
    if (e.target.files && e.target.files[0]) loadFile(e.target.files[0]);
  });
  center.addEventListener('dragover', function(e) { e.preventDefault(); });
  center.addEventListener('drop',     function(e) { e.preventDefault(); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });

  function loadFile(file) {
    if (!file.type.startsWith('image/')) return;
    annotations = []; placing = []; activeTool = 0; dragging = null;
    resetButtons();
    var reader = new FileReader();
    reader.onload = function(ev) {
      xrayImg.onload = function() {
        document.getElementById('empty-state').style.display = 'none';
        imgWrap.style.display = 'block';
        document.getElementById('tool-section').style.display = 'block';
        document.getElementById('intro').style.display = 'none';
        document.getElementById('upload-txt').textContent = 'Tap to replace';
        layoutImage();
      };
      xrayImg.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ── Tool controls ─────────────────────────────────────────────────────────
  function resetButtons() {
    var ids = ['btn-supp','btn-reg','btn-cobb'];
    for (var i = 0; i < ids.length; i++) {
      var b = document.getElementById(ids[i]);
      b.classList.remove('active-supp','active-reg','active-cobb');
    }
    document.getElementById('btn-supp').textContent = '📐 SUPPLEMENTARY (180°−x)';
    document.getElementById('btn-reg').textContent  = '📐 REGULAR ANGLE';
    document.getElementById('btn-cobb').textContent = '📏 COBB ANGLE';
  }

  window.activateTool = function(type) {
    if (activeTool === type) {
      // Toggle off
      activeTool = 0; placing = [];
      resetButtons();
    } else {
      activeTool = type; placing = [];
      resetButtons();
      var map = {1:['btn-supp','active-supp','📐 STOP PLACING'], 2:['btn-reg','active-reg','📐 STOP PLACING'], 3:['btn-cobb','active-cobb','📏 STOP PLACING']};
      var m = map[type];
      document.getElementById(m[0]).classList.add(m[1]);
      document.getElementById(m[0]).textContent = m[2];
    }
    redraw();
  };

  window.clearAll = function() {
    annotations = []; placing = []; activeTool = 0; dragging = null;
    resetButtons();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    updateUI();
  };

  window._delAnno = function(idx) {
    annotations.splice(idx, 1);
    redraw();
  };

  // ── Pointer events ────────────────────────────────────────────────────────
  canvas.addEventListener('mousedown',  onDown, false);
  canvas.addEventListener('mousemove',  onMove, false);
  canvas.addEventListener('mouseup',    onUp,   false);
  canvas.addEventListener('mouseleave', onUp,   false);
  canvas.addEventListener('touchstart', onDown, {passive:false});
  canvas.addEventListener('touchmove',  onMove, {passive:false});
  canvas.addEventListener('touchend',   onUp,   {passive:false});

  function onDown(e) {
    e.preventDefault(); e.stopPropagation();
    var pt = getPt(e);

    // Check drag on existing annotation points
    for (var ai = 0; ai < annotations.length; ai++) {
      var a = annotations[ai];
      var keys = a.type === 3 ? ['p1','p2','p3','p4'] : ['vertex','p1','p2'];
      for (var ki = 0; ki < keys.length; ki++) {
        if (dist(pt, a[keys[ki]]) <= HIT_R) {
          dragging = {ai:ai, key:keys[ki]};
          updateUI(); return;
        }
      }
    }

    // Check drag on in-progress placing points
    for (var pi = 0; pi < placing.length; pi++) {
      if (dist(pt, placing[pi]) <= HIT_R) {
        dragging = {placing:true, pi:pi};
        updateUI(); return;
      }
    }

    if (!activeTool) return;

    var maxPts = activeTool === 3 ? 4 : 3;
    if (placing.length < maxPts - 1) {
      placing.push(pt);
      redraw();
    } else {
      // Complete the measurement
      placing.push(pt);
      var pts = placing;
      var ang;
      if (activeTool === 3) {
        ang = cobbAngle(pts[0], pts[1], pts[2], pts[3]);
        annotations.push({type:3, p1:pts[0], p2:pts[1], p3:pts[2], p4:pts[3], angleDeg:ang, id:Date.now()});
      } else {
        ang = angleBetween(pts[1], pts[0], pts[2]);
        if (activeTool === 1) ang = 180 - ang;
        annotations.push({type:activeTool, vertex:pts[0], p1:pts[1], p2:pts[2], angleDeg:ang, id:Date.now()});
      }
      placing = [];
      redraw();
    }
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault(); e.stopPropagation();
    var pt = getPt(e);
    if (dragging.placing) {
      placing[dragging.pi] = pt;
    } else {
      var a = annotations[dragging.ai];
      a[dragging.key] = pt;
      // Recalculate angle
      if (a.type === 3) {
        a.angleDeg = cobbAngle(a.p1, a.p2, a.p3, a.p4);
      } else {
        var inner = angleBetween(a.p1, a.vertex, a.p2);
        a.angleDeg = a.type === 1 ? 180 - inner : inner;
      }
    }
    redraw();
  }

  function onUp(e) {
    if (e) { e.preventDefault(); e.stopPropagation(); }
    dragging = null;
    updateUI();
  }

  // Prevent page scroll on touch
  document.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive:false});

})();
</script>

</body>
</html>
