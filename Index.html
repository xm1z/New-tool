<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="OrthoToolbox"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#050a0e"/>
  <link rel="manifest" id="pwa-manifest"/>
  <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxOTIgMTkyIj48cmVjdCB3aWR0aD0iMTkyIiBoZWlnaHQ9IjE5MiIgcng9IjM4IiBmaWxsPSIjMGExNjI4Ii8+PGcgZmlsbD0iI2M4ZDhlOCI+PHJlY3QgeD0iODgiIHk9IjU1IiB3aWR0aD0iMTYiIGhlaWdodD0iODIiIHJ4PSI2Ii8+PGNpcmNsZSBjeD0iNzgiIGN5PSI1OCIgcj0iMTYiLz48Y2lyY2xlIGN4PSIxMTQiIGN5PSI1OCIgcj0iMTYiLz48Y2lyY2xlIGN4PSI3OCIgY3k9IjEzNCIgcj0iMTYiLz48Y2lyY2xlIGN4PSIxMTQiIGN5PSIxMzQiIHI9IjE2Ii8+PHJlY3QgeD0iNzAiIHk9IjU1IiB3aWR0aD0iNTIiIGhlaWdodD0iODIiIHJ4PSIwIi8+PHJlY3QgeD0iNzgiIHk9IjY0IiB3aWR0aD0iMzYiIGhlaWdodD0iNjQiIHJ4PSI0IiBmaWxsPSIjMGExNjI4Ii8+PC9nPjxnIHN0cm9rZT0iI2ZmZGQwMCIgc3Ryb2tlLXdpZHRoPSI1IiBzdHJva2UtbGluZWNhcD0icm91bmQiIGZpbGw9Im5vbmUiPjxsaW5lIHgxPSI1MiIgeTE9IjE1MCIgeDI9Ijk2IiB5Mj0iOTYiLz48bGluZSB4MT0iOTYiIHkxPSI5NiIgeDI9IjE1MiIgeTI9IjExMCIvPjxwYXRoIGQ9Ik0gNzIgMTE4IEEgMzQgMzQgMCAwIDEgMTEyIDEwNCIvPjwvZz48Y2lyY2xlIGN4PSI5NiIgY3k9Ijk2IiByPSI1IiBmaWxsPSIjZmY2MDMwIi8+PHRleHQgeD0iMTE4IiB5PSI4OCIgZm9udC1mYW1pbHk9IkNvdXJpZXIgTmV3IiBmb250LXdlaWdodD0iYm9sZCIgZm9udC1zaXplPSIyMiIgZmlsbD0iI2ZmZGQwMCI+wrg8L3RleHQ+PC9zdmc+"/>
  <title>Orthopedic Toolbox</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px)}
    html,body{width:100%;height:100%;overflow:hidden;background:#050a0e;color:#c8d8e8;font-family:'Courier New',monospace}
    #app{display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden}
    #header{flex-shrink:0;background:linear-gradient(135deg,#0a1628,#0d1f3c,#0a1628);border-bottom:2px solid #1a3a5c;padding-top:var(--sat)}
    #title-bar{padding:7px 14px;display:flex;align-items:center;gap:10px}
    #title-icon{width:26px;height:26px;background:radial-gradient(circle,#00a8ff,#003c6e);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
    .t-main{font-size:12px;font-weight:700;color:#e0f0ff;letter-spacing:2px}
    #mode-tabs{display:flex;flex-shrink:0;border-bottom:1px solid #1a3a5c;overflow-x:auto}
    .tab{flex-shrink:0;padding:8px 8px;text-align:center;font-size:8px;font-weight:700;color:#3a6a8a;cursor:pointer;background:none;font-family:'Courier New',monospace;border-bottom:3px solid transparent}
    .tab.active{color:#00a8ff;border-bottom-color:#00a8ff}
    #screen-angle{display:flex;flex:1;min-height:0;overflow:hidden;flex-direction:column}
    #screen-tttg{display:none;flex:1;min-height:0;overflow:hidden;flex-direction:column}
    #screen-fav{display:none;flex:1;min-height:0;overflow:hidden;flex-direction:column}
    #screen-lea{display:none;flex:1;min-height:0;overflow:hidden;flex-direction:column}
    .center-panel{flex:1;min-width:0;background:#020608;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;color:#1a3a5a;height:100%;width:100%}
    .empty-state .ei{font-size:54px;opacity:0.12}
    .empty-state .em{font-size:11px;letter-spacing:3px;margin-top:10px}
    #img-wrap{display:none;position:relative;transform-origin:center center}
    #overlay{position:absolute;top:0;left:0}
    #tttg-canvas-wrap{display:none;position:relative;transform-origin:center center}
    #fav-canvas-wrap{display:none;position:relative;transform-origin:center center}
    #lea-canvas-wrap{display:none;position:relative;transform-origin:center center}
    .zreset{position:absolute;top:8px;right:8px;z-index:20;background:#0a1628dd;border:1px solid #1a3a5c;color:#5a8aaa;font-family:'Courier New',monospace;font-size:9px;padding:5px 9px;border-radius:4px;cursor:pointer;display:none}
    .zoom-hint{display:none}
    @media(min-width:768px){.zoom-hint{display:block;position:absolute;bottom:10px;right:10px;font-size:10px;color:#2a4a6a;background:#020608cc;padding:4px 8px;border-radius:4px}}
    .ftoolbar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;background:#05080fee;border:1px solid #1a3a5c;border-radius:30px;padding:7px 12px;backdrop-filter:blur(8px)}
    .ftoolbar-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:8px;min-width:36px}
    .ftoolbar-btn .ftico{font-size:18px}
    .ftoolbar-btn .ftlbl{font-size:7px;color:#3a6a8a}
    .ftoolbar-sep{width:1px;height:28px;background:#1a3a5c}
    .ftoolbar-btn.active-ft{background:#00152a;outline:1px solid #00e5ff44}
    .bsheet{position:fixed;bottom:0;left:0;right:0;z-index:200;background:#070d14;border-top:1px solid #1a3a5c;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform 0.32s;max-height:82vh;display:flex;flex-direction:column;padding-bottom:var(--sab,0px)}
    .bsheet.open{transform:translateY(0)}
    .bsheet-handle{width:36px;height:4px;background:#1a3a5c;border-radius:2px;margin:10px auto 4px;cursor:pointer}
    .bsheet-title{font-size:10px;font-weight:700;text-align:center;padding:4px 0 8px;color:#3a6a8a}
    .bsheet-body{overflow-y:auto;padding:0 14px 20px;flex:1}
    .bsheet-backdrop{display:none;position:fixed;inset:0;z-index:199;background:#00000044}
    .bsheet-backdrop.open{display:block}
    .slabel{font-size:9px;color:#3a6a8a;letter-spacing:2px;margin-bottom:2px}
    .upload-box{display:block;border:2px dashed #1a3a5c;border-radius:7px;padding:10px 8px;text-align:center;cursor:pointer;background:#0a1420}
    .upload-box .uico{font-size:18px}
    .btn-tool{width:100%;padding:8px 6px;border-radius:6px;border:1px solid #1a3a5c;background:#0a1420;color:#5a8aaa;font-size:10px;font-weight:700;cursor:pointer;font-family:'Courier New',monospace}
    .btn-danger{width:100%;padding:6px;background:#1a0a0a;border:1px solid #3a1a1a;border-radius:4px;color:#8a4a4a;font-size:10px;cursor:pointer;display:none}
    .step-row{display:flex;align-items:center;gap:5px;font-size:9px;color:#3a6a8a}
    .badge{width:16px;height:16px;border-radius:50%;background:#1a3a5c;color:#5a8aaa;font-size:8px;font-weight:700;text-align:center;line-height:16px}
    .badge.done{background:#4ade8022;color:#4ade80;border:1px solid #4ade8044}
    .result-float{position:absolute;top:10px;right:10px;z-index:100;background:#020e1aee;border:1px solid #00e5ff66;border-radius:12px;padding:6px 12px 10px;min-width:130px;backdrop-filter:blur(12px);display:none;cursor:move}
    .result-float .rf-handle{width:28px;height:3px;background:#1a4a6a;border-radius:2px;margin:0 auto 6px}
    .rf-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0a1a2a}
    .rf-label{font-size:8px;color:#4a7a9a}
    .rf-val{font-size:13px;font-weight:700;color:#00e5ff}
    #tttg-result{display:none;background:#001828;border:2px solid #00cfff55;border-radius:8px;padding:10px;text-align:center}
    #tttg-result .rv{font-size:28px;font-weight:700;color:#00cfff}
    #fav-result{display:none;background:#00101a;border:2px solid #aa88ff55;border-radius:8px;padding:10px;text-align:center}
    #fav-result .fr-val{font-size:28px;font-weight:700;color:#aa88ff}
    #lea-result{display:none;background:#000d1a;border:1px solid #00e5ff33;border-radius:7px;padding:8px}
    .lr-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #0a1a2a}
    .lr-label{font-size:8px;color:#3a6a8a}
    .lr-val{font-size:13px;font-weight:700}
    .opacity-row{display:flex;align-items:center;gap:6px;font-size:9px}
    input[type=range]{flex:1;accent-color:#00cfff}
    .sep{height:1px;background:#1a2a3a;margin:8px 0}
    .hint-box{font-size:10px;border-radius:5px;padding:7px 10px;display:none}
    .readout-box{display:none;background:#0d1a0a;border:2px solid #4ade8055;border-radius:8px;padding:8px;text-align:center}
    .readout-box .rv{font-size:22px;font-weight:700}
    #pelv-result{display:none;background:#001a10;border:2px solid #44ffaa55;border-radius:8px;padding:8px}
    .lea-btn{width:100%;padding:7px 6px;border-radius:5px;border:1px solid #1a3a5c;background:#0a1420;color:#5a8aaa;font-size:9px;font-weight:700;cursor:pointer;text-align:left;font-family:'Courier New',monospace}
    .lea-btn.active-lea{border-color:#00e5ff;background:#00152a;color:#00e5ff}
    .fav-btn{width:100%;padding:8px 6px;border-radius:6px;border:1px solid #1a3a5c;background:#0a1420;color:#5a8aaa;font-size:9px;font-weight:700;cursor:pointer;font-family:'Courier New',monospace}
    .fav-btn.active-neck{border-color:#aa88ff;background:#1a0a2a;color:#aa88ff}
    .fav-btn.active-cond{border-color:#44ffdd;background:#002a22;color:#44ffdd}
    #lea-cal-circle-div{display:none;position:absolute;border:2.5px dashed #ffdd00;border-radius:50%;transform:translate(-50%,-50%);cursor:move;z-index:10}
    #lea-circle-knob{position:absolute;top:50%;right:-10px;transform:translateY(-50%);width:18px;height:18px;background:#ffdd00;border-radius:50%;cursor:ew-resize;z-index:11}
    @media(min-width:768px){.tab{font-size:11px;padding:10px 16px}.btn-tool,.fav-btn{font-size:12px}.result-float{min-width:160px}}
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title-bar"><div id="title-icon">🦴</div><div class="t-main">ORTHOPEDIC TOOLBOX</div></div>
  </div>
  <div id="mode-tabs">
    <button class="tab active" id="tab-angle" onclick="switchMode('angle')">📐 ANGLE TOOLS</button>
    <button class="tab" id="tab-tttg" onclick="switchMode('tttg')">📏 TT-TG DISTANCE</button>
    <button class="tab" id="tab-fav" onclick="switchMode('fav')">🦴 ANTEVERSION</button>
    <button class="tab" id="tab-lea" onclick="switchMode('lea')">📐 LEG ALIGNMENT</button>
  </div>

  <!-- ANGLE SCREEN -->
  <div id="screen-angle">
    <div class="center-panel" id="angle-center">
      <div class="empty-state" id="a-empty"><div class="ei">🩻</div><div class="em">NO RADIOGRAPH LOADED</div></div>
      <div class="zoom-hint">scroll to zoom · drag to pan</div>
      <svg id="a-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5"></svg>
      <div id="img-wrap"><img id="xray-img" alt=""/><canvas id="overlay" style="position:absolute;top:0;left:0"></canvas></div>
    </div>
    <div class="result-float" id="a-result-float"><div class="rf-handle"></div><div class="rf-title">MEASUREMENT</div><div id="a-rf-body"></div></div>
    <div class="ftoolbar" id="a-ftoolbar" style="display:flex">
      <button class="ftoolbar-btn" onclick="document.getElementById('a-sheet').classList.toggle('open')"><span class="ftico">📤</span><span class="ftlbl">UPLOAD</span></button>
      <div class="ftoolbar-sep"></div>
      <button class="ftoolbar-btn" id="ft-supp" onclick="activateTool(1)"><span class="ftico">📐</span><span class="ftlbl">SUPPL</span></button>
      <button class="ftoolbar-btn" id="ft-reg" onclick="activateTool(2)"><span class="ftico">📐</span><span class="ftlbl">ANGLE</span></button>
      <button class="ftoolbar-btn" id="ft-cobb" onclick="activateTool(3)"><span class="ftico">📏</span><span class="ftlbl">COBB</span></button>
      <button class="ftoolbar-btn" id="ft-pelv" onclick="activateTool(4)"><span class="ftico">🦴</span><span class="ftlbl">PELVIS</span></button>
      <div class="ftoolbar-sep"></div>
      <button class="ftoolbar-btn" onclick="clearAll()"><span class="ftico">✕</span><span class="ftlbl">CLEAR</span></button>
    </div>
    <div class="bsheet" id="a-sheet">
      <div class="bsheet-handle" onclick="this.closest('.bsheet').classList.remove('open')"></div>
      <div class="bsheet-title">ANGLE TOOLS</div>
      <div class="bsheet-body">
        <label class="upload-box" for="xray-upload"><div class="uico">📡</div><div class="utxt">Tap to load X-ray</div></label>
        <input id="xray-upload" type="file" accept="image/*" style="display:none"/>
        <div id="tool-section-sheet" style="display:none">
          <button id="btn-supp2" class="btn-tool" onclick="activateTool(1)">📐 SUPPLEMENTARY</button>
          <button id="btn-reg2" class="btn-tool" onclick="activateTool(2)">📐 REGULAR ANGLE</button>
          <button id="btn-cobb2" class="btn-tool" onclick="activateTool(3)">📏 COBB ANGLE</button>
          <button id="btn-pelv2" class="btn-tool" onclick="activateTool(4)">🦴 PELVIC PARAMETERS</button>
          <button id="btn-clear2" class="btn-danger" onclick="clearAll()">✕ CLEAR ALL</button>
        </div>
      </div>
    </div>
  </div>

  <!-- TT-TG SCREEN -->
  <div id="screen-tttg">
    <div id="tttg-center" class="center-panel">
      <div class="empty-state" id="t-empty"><div class="ei">🦴</div><div class="em">UPLOAD BOTH IMAGES</div></div>
      <button class="zreset" id="t-zreset" onclick="tZoomReset()">⊡ RESET ZOOM</button>
      <svg id="t-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5"></svg>
      <div id="tttg-canvas-wrap"><canvas id="tttg-canvas"></canvas></div>
    </div>
    <input id="tg-upload" type="file" accept="image/*" style="display:none"/>
    <input id="tt-upload" type="file" accept="image/*" style="display:none"/>
    <div class="ftoolbar" id="t-ftoolbar" style="display:none">
      <button class="ftoolbar-btn" onclick="document.getElementById('t-sheet').classList.toggle('open')"><span class="ftico">📤</span><span class="ftlbl">IMAGES</span></button>
      <div class="ftoolbar-sep"></div>
      <button class="ftoolbar-btn" id="ft-ruler" onclick="tActivate('ruler')"><span class="ftico">📏</span><span class="ftlbl">RULER</span></button>
      <button class="ftoolbar-btn" id="ft-bl" onclick="tActivate('bl')"><span class="ftico">➖</span><span class="ftlbl">pFCL</span></button>
      <button class="ftoolbar-btn" id="ft-tg" onclick="tActivate('tg')"><span class="ftico">●</span><span class="ftlbl">TG</span></button>
      <button class="ftoolbar-btn" id="ft-tt" onclick="tActivate('tt')"><span class="ftico">●</span><span class="ftlbl">TT</span></button>
      <button class="ftoolbar-btn" onclick="tReset()"><span class="ftico">↺</span><span class="ftlbl">RESET</span></button>
    </div>
    <div class="bsheet" id="t-sheet">
      <div class="bsheet-handle" onclick="this.closest('.bsheet').classList.remove('open')"></div>
      <div class="bsheet-title">TT-TG DISTANCE</div>
      <div class="bsheet-body">
        <label class="upload-box" for="tg-upload"><div class="uico">🦴</div><div class="utxt">Trochlea MRI</div></label>
        <label class="upload-box" for="tt-upload"><div class="uico">🦵</div><div class="utxt">Tuberosity MRI</div></label>
        <div id="tttg-tools-sheet" style="display:none">
          <div class="opacity-row"><span>TG</span><input type="range" id="op-sl2" min="0" max="100" value="50" oninput="document.getElementById('op-sl').value=this.value;tDraw()"/><span>TT</span></div>
          <button id="btn-ruler2" class="btn-tool" onclick="tActivate('ruler')">📏 RULER</button>
          <button id="btn-bl2" class="btn-tool" onclick="tActivate('bl')">📏 pFCL LINE</button>
          <button id="btn-tg2" class="btn-tool" onclick="tActivate('tg')">🔵 MARK TG</button>
          <button id="btn-tt2" class="btn-tool" onclick="tActivate('tt')">🔴 MARK TT</button>
          <button class="btn-danger" onclick="tReset()">RESET</button>
        </div>
      </div>
    </div>
    <div class="result-float" id="tttg-result-float"><div class="rf-handle"></div><div class="rf-title">TT-TG</div><div class="rf-row"><span class="rf-label">Distance</span><span class="rf-val" id="t-rv-float">—</span></div></div>
  </div>

  <!-- ANTEVERSION SCREEN -->
  <div id="screen-fav">
    <div id="fav-center" class="center-panel">
      <div class="empty-state" id="fav-empty"><div class="ei">🦴</div><div class="em">UPLOAD BOTH CT SLICES</div></div>
      <button class="zreset" id="fav-zreset" onclick="favZoomReset()">⊡ RESET ZOOM</button>
      <svg id="fav-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5"></svg>
      <div id="fav-canvas-wrap"><canvas id="fav-canvas"></canvas></div>
    </div>
    <input id="fav-neck-upload" type="file" accept="image/*" style="display:none"/>
    <input id="fav-cond-upload" type="file" accept="image/*" style="display:none"/>
    <div class="ftoolbar" id="fav-ftoolbar" style="display:none">
      <button class="ftoolbar-btn" onclick="document.getElementById('fav-sheet').classList.toggle('open')"><span class="ftico">📤</span><span class="ftlbl">IMAGES</span></button>
      <button class="ftoolbar-btn" id="ft-neck" onclick="favActivate('neck')"><span class="ftico">●</span><span class="ftlbl">NECK</span></button>
      <button class="ftoolbar-btn" id="ft-cond" onclick="favActivate('cond')"><span class="ftico">●</span><span class="ftlbl">CONDYLE</span></button>
      <button class="ftoolbar-btn" onclick="favReset()"><span class="ftico">↺</span><span class="ftlbl">RESET</span></button>
    </div>
    <div class="bsheet" id="fav-sheet">
      <div class="bsheet-handle" onclick="this.closest('.bsheet').classList.remove('open')"></div>
      <div class="bsheet-title">ANTEVERSION</div>
      <div class="bsheet-body">
        <label class="upload-box" for="fav-neck-upload"><div class="uico">🦴</div><div class="utxt">Neck CT</div></label>
        <label class="upload-box" for="fav-cond-upload"><div class="uico">🦵</div><div class="utxt">Condyle CT</div></label>
        <div id="fav-tools-sheet" style="display:none">
          <div class="opacity-row"><span>Neck</span><input type="range" id="fav-op-sl2" min="0" max="100" value="50" oninput="document.getElementById('fav-op-sl').value=this.value;favDraw()"/><span>Condyle</span></div>
          <button class="fav-btn" id="fav-btn-neck2" onclick="favActivate('neck')">NECK AXIS</button>
          <button class="fav-btn" id="fav-btn-cond2" onclick="favActivate('cond')">CONDYLE AXIS</button>
          <button class="btn-danger" onclick="favReset()">RESET</button>
        </div>
      </div>
    </div>
    <div class="result-float" id="fav-result-float"><div class="rf-handle"></div><div class="rf-title">ANTEVERSION</div><div class="rf-row"><span class="rf-label">Angle</span><span class="rf-val" id="fav-val-float">—</span></div></div>
  </div>

  <!-- LEG ALIGNMENT SCREEN -->
  <div id="screen-lea">
    <div id="lea-center" class="center-panel">
      <div class="empty-state" id="lea-empty"><div class="ei">🦵</div><div class="em">NO X-RAY LOADED</div></div>
      <button class="zreset" id="lea-zreset" onclick="leaZoomReset()">⊡ RESET ZOOM</button>
      <svg id="lea-svg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5"></svg>
      <div id="lea-canvas-wrap"><canvas id="lea-canvas"></canvas><img id="lea-xray-img" alt="" style="display:none"/></div>
      <div id="lea-cal-circle-div"><div id="lea-circle-knob"></div></div>
    </div>
    <input id="lea-upload" type="file" accept="image/*" style="display:none"/>
    <div id="lea-ftoolbar" style="display:none;position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:100;flex-direction:column;gap:5px">
      <div class="ftoolbar" style="position:static;transform:none;padding:5px 8px;gap:4px">
        <button class="ftoolbar-btn" onclick="leaActivate('fh')"><span class="ftico">●</span><span class="ftlbl">FH</span></button>
        <button class="ftoolbar-btn" onclick="leaActivate('pf')"><span class="ftico">●</span><span class="ftlbl">PF</span></button>
        <button class="ftoolbar-btn" onclick="leaActivate('fdc')"><span class="ftico">●</span><span class="ftlbl">FDC</span></button>
        <button class="ftoolbar-btn" onclick="leaActivate('kj')"><span class="ftico">●</span><span class="ftlbl">KJ</span></button>

function leaUpdateCircleDiv(){var div=document.getElementById('lea-cal-circle-div');if(!div||!leaCal.calCircle)return;var cc=leaCal.calCircle;var wrapRect=leaWrap.getBoundingClientRect();var centerRect=leaCenter.getBoundingClientRect();var z=leaZ.s;var sx=(wrapRect.left-centerRect.left)+cc.cx*z;var sy=(wrapRect.top-centerRect.top)+cc.cy*z;div.style.display='block';div.style.left=sx+'px';div.style.top=sy+'px';div.style.width=(cc.r*z*2)+'px';div.style.height=(cc.r*z*2)+'px';}
(function(){var cdiv=document.getElementById('lea-cal-circle-div');var knob=document.getElementById('lea-circle-knob');var _move=null,_resize=null;function bodyDown(e){if(e.target===knob)return;if(!leaCal.calCircle)return;e.preventDefault();var src=e.touches?e.touches[0]:e;_move={startX:src.clientX,startY:src.clientY,cx0:leaCal.calCircle.cx,cy0:leaCal.calCircle.cy};}function bodyMove(e){if(!_move||!leaCal.calCircle)return;e.preventDefault();var src=e.touches?e.touches[0]:e;leaCal.calCircle.cx=_move.cx0+(src.clientX-_move.startX)/leaZ.s;leaCal.calCircle.cy=_move.cy0+(src.clientY-_move.startY)/leaZ.s;leaUpdateCircleDiv();leaApplyRuler();}function bodyUp(){_move=null;}function knobDown(e){if(!leaCal.calCircle)return;e.preventDefault();var src=e.touches?e.touches[0]:e;_resize={startX:src.clientX,r0:leaCal.calCircle.r};}function knobMove(e){if(!_resize||!leaCal.calCircle)return;e.preventDefault();var src=e.touches?e.touches[0]:e;var delta=(src.clientX-_resize.startX)/leaZ.s*0.5;leaCal.calCircle.r=Math.max(2,_resize.r0+delta);leaUpdateCircleDiv();leaApplyRuler();}function knobUp(){_resize=null;}cdiv.addEventListener('touchstart',bodyDown,{passive:false});cdiv.addEventListener('touchmove',bodyMove,{passive:false});cdiv.addEventListener('touchend',bodyUp);cdiv.addEventListener('mousedown',bodyDown);knob.addEventListener('touchstart',knobDown,{passive:false});knob.addEventListener('touchmove',knobMove,{passive:false});knob.addEventListener('touchend',knobUp);knob.addEventListener('mousedown',knobDown);window.addEventListener('mousemove',function(e){if(_move)bodyMove(e);if(_resize)knobMove(e);});window.addEventListener('mouseup',function(){_move=null;_resize=null;});})();
window.leaApplyRuler=function(){var mm=parseFloat(document.getElementById('lea-cal-mm').value)||50;var pxLen=0;if(leaState.calMode==='ruler'&&leaCal.cal){var dx=leaCal.cal.p2.x-leaCal.cal.p1.x,dy=leaCal.cal.p2.y-leaCal.cal.p1.y;pxLen=Math.sqrt(dx*dx+dy*dy);}else if(leaState.calMode==='circle'&&leaCal.calCircle){pxLen=leaCal.calCircle.r*2;}if(!pxLen)return;leaState.pxPerMm=pxLen/mm;var el=document.getElementById('lea-cal-status');el.style.display='block';el.textContent='✓ '+leaState.pxPerMm.toFixed(2)+' px/mm';leaDraw();};

function leaDown(e){e.preventDefault();var pt=leaPt(e),m=leaState.mode,z=leaZ.s,HIT=24/z;var p=leaActivePts();if(m==='fh'||m==='pf'||m==='fdc'||m==='kj'||m==='tpc'||m==='tdc'||m==='aj'){p[m]=pt;leaState.mode=null;leaUpdateBtns();leaDraw();return;}if(m==='cal_circle'){leaCal.calCircle={cx:pt.x,cy:pt.y,r:40};leaState.mode=null;leaUpdateBtns();leaUpdateCircleDiv();leaApplyRuler();return;}if(m==='fc'||m==='tp'||m==='cal'){if(!leaState.tmp){leaState.tmp=pt;leaUpdateBtns();leaDraw();}else{if(m==='fc'){p.fc1=leaState.tmp;p.fc2=pt;}else if(m==='tp'){p.tp1=leaState.tmp;p.tp2=pt;}else if(m==='cal'){leaCal.cal={p1:leaState.tmp,p2:pt};leaApplyRuler();}leaState.tmp=null;leaState.mode=null;leaUpdateBtns();leaDraw();}return;}var hits=[{k:'fh',p:p.fh},{k:'pf',p:p.pf},{k:'fdc',p:p.fdc},{k:'kj',p:p.kj},{k:'tpc',p:p.tpc},{k:'tdc',p:p.tdc},{k:'aj',p:p.aj},{k:'fc1',p:p.fc1},{k:'fc2',p:p.fc2},{k:'tp1',p:p.tp1},{k:'tp2',p:p.tp2},{k:'cal_p1',p:leaCal.cal?leaCal.cal.p1:null},{k:'cal_p2',p:leaCal.cal?leaCal.cal.p2:null},{k:'circle_c',p:leaCal.calCircle?{x:leaCal.calCircle.cx,y:leaCal.calCircle.cy}:null}];for(var i=0;i<hits.length;i++){if(hits[i].p&&dist(pt,hits[i].p)<=HIT){leaDrg=hits[i].k;return;}}}
